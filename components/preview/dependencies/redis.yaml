apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
    preview.sonia.so/plumbing: redis
spec:
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15
    imagePullPolicy: IfNotPresent
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

