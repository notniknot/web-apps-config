apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: web

resources:
  - ../../apps/web/base

components:
  - ../../components/preview/route
  - ../../components/preview/secrets

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/version: preview-pr-1
      preview.sonia.so/enabled: "true"
      preview.sonia.so/pr: "1"

images:
  - name: ghcr.io/notniknot/web-apps
    newTag: preview-pr-1

patches:
  - path: patches/deployment-env.yaml
  - path: patches/httproute-hostname.yaml
