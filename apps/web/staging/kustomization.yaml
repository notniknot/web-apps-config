# Illustrative staging env overlay — this repo's test setup deploys only
# playground (see web-staging.argocd.yaml for the cluster Application that
# would consume it). It shows that previews layer on top of a rendered env
# overlay with its own make-it-work patches, rather than raw base.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  # This env's PreviewTemplate: applied to the cluster with the app so the
  # preview UI can read it. The preview controller strips it from preview
  # renders (see preview.yaml header).
  - preview.yaml

images:
  - name: ghcr.io/notniknot/web-apps
    newTag: staging

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/version: staging

replicas:
  - name: web
    count: 2

patches:
  - target:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: web
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: web.staging.sonia-certs.uk
  - target:
      group: argocd-image-updater.argoproj.io
      kind: ImageUpdater
      name: web
    patch: |-
      - op: replace
        path: /spec/applicationRefs/0/images/0/imageName
        value: ghcr.io/notniknot/web-apps:staging
