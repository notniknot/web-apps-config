# DUMMY overlay for illustration — this repo's test setup only runs
# playground. It stands in for a real staging env overlay with its own
# make-it-work patches, to show that previews layer on top of a rendered env
# overlay rather than raw base.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

images:
  - name: ghcr.io/notniknot/web-apps
    newTag: staging

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/version: staging

replicas:
  - name: web
    count: 2

patches:
  - target:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: web
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: web.staging.sonia-certs.uk
  - target:
      group: argocd-image-updater.argoproj.io
      kind: ImageUpdater
      name: web
    patch: |-
      - op: replace
        path: /spec/applicationRefs/0/images/0/imageName
        value: ghcr.io/notniknot/web-apps:staging
