# PreviewTemplate for previews of the staging env (illustrative — this test
# setup deploys only playground). Same placement rationale as
# ../playground/preview.yaml: the env overlay carries its own template, so the
# staging cluster gets it via GitOps. application.name is "web" here too —
# app identity is per cluster, and the backend matches the template against
# the Argo CD app the user selected on that cluster.
apiVersion: preview.sonia.so/v1alpha1
kind: PreviewTemplate
metadata:
  name: web
spec:
  enabled: true
  configRepository: notniknot/web-apps-config
  path: apps/web
  application:
    name: web

  preview:
    overlayPath: previews/staging
    extraSources:
      - path: previews/helm/addon
        helm:
          valueFiles:
            - values.yaml
            - ../values/preview-values.yaml
          valuesObject:
            message: preview-{{.PreviewID}}

  values:
    hostname: web-{{.PreviewID}}.staging.sonia-certs.uk
    imageTagPrefix: preview-{{.PreviewID}}-
  expose:
    - imageTagPrefix
  secrets:
    import:
      - ghcr-pull-secret
      - shared-preview-secret
