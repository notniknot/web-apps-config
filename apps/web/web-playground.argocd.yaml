apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: web
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: web
  sources:
    # Source for raw manifests (kustomize)
    - repoURL: git@github.com:notniknot/web-apps-config.git
      targetRevision: main
      path: apps/web/playground
      kustomize: {}
    - repoURL: git@github.com:notniknot/web-apps-config.git
      targetRevision: main
      path: apps/web/helm/addon
      helm:
        valueFiles:
          - $values/apps/web/base/addon-values.yaml
          - $values/apps/web/playground/addon-values.yaml
    - repoURL: git@github.com:notniknot/web-apps-config.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: web
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true
    retry:
      refresh: true
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
