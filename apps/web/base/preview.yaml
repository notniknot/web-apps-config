apiVersion: preview.sonia.so/v1alpha1
kind: PreviewTemplate
metadata:
  name: web-playground
spec:
  enabled: true
  configRepository: notniknot/web-apps-config
  # The app directory in the config repo. The preview backend derives the
  # request's application ref from it (app name = last path segment).
  path: apps/web
  application:
    path: web-playground.argocd.yaml
  values:
    hostname: web-{{.PreviewID}}.sonia-certs.uk
    imageTagPrefix: preview-{{.PreviewID}}-
  # Values a preview requester may override from the UI. Everything else is
  # fixed by this template. imageTagPrefix lets a preview point Argo CD Image
  # Updater at a specific build (e.g. a PR's images) without renaming the
  # preview; leaving it blank uses the default above.
  expose:
    - imageTagPrefix
  secrets:
    import:
      - ghcr-pull-secret
      - shared-preview-secret
  # ── Rendering rules ────────────────────────────────────────────────────────
  # How the controller mutates the app's sources into a preview. Patches are
  # inlined (no external files) so the template is self-contained.
  sourcePolicy: include-all
  sources:
    - index: 0
      action: keep
      kustomize:
        components:
          - ../previews/components
        patches:
          - target:
              group: apps
              kind: Deployment
              name: web
            patchTemplate: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: web
              spec:
                template:
                  spec:
                    containers:
                      - name: web
                        env:
                          - name: PREVIEW_PR
                            value: "{{.PR}}"
          - target:
              group: gateway.networking.k8s.io
              kind: HTTPRoute
              name: web
            patchTemplate: |-
              - op: replace
                path: /spec/hostnames/0
                value: "{{.Values.hostname}}"
          - target:
              group: argocd-image-updater.argoproj.io
              kind: ImageUpdater
              name: web
            patchTemplate: |-
              - op: replace
                path: /metadata/name
                value: web-apps-preview-{{.PreviewID}}
              - op: replace
                path: /spec/writeBackConfig/method
                value: argocd
              - op: remove
                path: /spec/writeBackConfig/gitConfig
              - op: replace
                path: /spec/applicationRefs/0/namePattern
                value: web-apps-preview-{{.PreviewID}}
              - op: replace
                path: /spec/applicationRefs/0/images/0/commonUpdateSettings/updateStrategy
                value: newest-build
              - op: add
                path: /spec/applicationRefs/0/images/0/commonUpdateSettings/allowTags
                value: regexp:^{{.Values.imageTagPrefix}}.*
          - target:
              kind: ConfigMap
              name: preview-demo
            patchTemplate: |-
              - op: replace
                path: /data/pr
                value: "{{.PR}}"
              - op: replace
                path: /data/hostname
                value: "{{.Values.hostname}}"
          - target:
              kind: PersistentVolume
              name: web-s3-public
            patchTemplate: |-
              - op: replace
                path: /metadata/name
                value: web-{{.PreviewID}}-s3-public
              - op: replace
                path: /spec/claimRef/namespace
                value: {{.HostNamespace}}
          - target:
              kind: PersistentVolumeClaim
              name: web-s3-public
            patchTemplate: |-
              - op: replace
                path: /spec/volumeName
                value: web-{{.PreviewID}}-s3-public
          # This template ships in the app's base, so a preview (which renders
          # base) would otherwise re-apply a copy of it into its own namespace.
          # Drop it from previews.
          - target:
              group: preview.sonia.so
              kind: PreviewTemplate
              name: web-playground
            patchTemplate: |-
              $patch: delete
              apiVersion: preview.sonia.so/v1alpha1
              kind: PreviewTemplate
              metadata:
                name: web-playground
    - index: 1
      action: keep
      helm:
        valuesObject:
          message: preview-{{.PreviewID}}
