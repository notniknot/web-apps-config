apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: web-apps
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: north-south
      namespace: kgateway-system
  hostnames:
    - web.example.invalid
  rules:
    - backendRefs:
        - name: web
          port: 80
