apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: web-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: web-apps
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/notniknot/web-apps:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_NAME
              value: web-apps
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/version']
            - name: PREVIEW_PR
              value: none
            - name: SHARED_SECRET_MESSAGE
              valueFrom:
                secretKeyRef:
                  name: shared-preview-secret
                  key: message
                  optional: true
            - name: GENERATED_SECRET_MESSAGE
              valueFrom:
                secretKeyRef:
                  name: generated-preview-secret
                  key: message
                  optional: true
            - name: REDIS_HOST
              value: web-redis
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: web-redis
                  key: REDIS_PASSWORD
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: s3-public
              mountPath: /mnt/s3
              readOnly: true
      volumes:
        - name: s3-public
          persistentVolumeClaim:
            claimName: web-s3-public
            readOnly: true
