apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - external-secret.yaml
  - httproute.yaml
  # Shared across all clusters (only the tracked tag differs per overlay). The
  # previews overlay adapts it in-branch (writeback method, allowTags).
  - image-updater.yaml
  - redis.yaml
  - s3-persistent-volume.yaml
  - s3-persistent-volume-claim.yaml
  - service.yaml

images:
  - name: ghcr.io/notniknot/web-apps
    newTag: main
