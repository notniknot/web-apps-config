apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: web

resources:
  - ../base

images:
  - name: ghcr.io/notniknot/web-apps
    newTag: main

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/version: main

replicas:
  - name: web
    count: 1
