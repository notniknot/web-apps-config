preview:
  enabled: true
  app: web
  tenant: web
  configRepository: web-apps-config
  source:
    path: apps/web/playground
    targetRevision: main
    applicationPath: web-playground.argocd.yaml
  components:
    - ../previews/components
  patches:
    - target:
        group: apps
        kind: Deployment
        name: web
      path: previews/patches/deployment-env.yaml
    - target:
        group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: web
      path: previews/patches/httproute-hostname.yaml
    - target:
        group: argocd-image-updater.argoproj.io
        kind: ImageUpdater
        name: web
      path: previews/patches/image-updater-preview.yaml
    - target:
        kind: ConfigMap
        name: preview-demo
      path: previews/patches/preview-demo.yaml
    - target:
        kind: PersistentVolume
        name: web-s3-public
      path: previews/patches/s3-persistent-volume.yaml
    - target:
        kind: PersistentVolumeClaim
        name: web-s3-public
      path: previews/patches/s3-persistent-volume-claim.yaml
  values:
    hostname: web-pr-{{.PR}}.sonia-certs.uk
    imageTagPrefix: preview-pr-{{.PR}}-
  secrets:
    import:
      - ghcr-pull-secret
      - shared-preview-secret
    generated:
      - generated-preview-secret
