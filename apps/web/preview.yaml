apiVersion: preview.sonia.so/v1alpha1
kind: PreviewTemplate
metadata:
  name: web-playground
spec:
  enabled: true
  configRepository: notniknot/web-apps-config
  application:
    path: web-playground.argocd.yaml
  sourcePolicy: include-all
  sources:
    - index: 0
      action: keep
      kustomize:
        components:
          - ../previews/components
        patches:
          - target:
              group: apps
              kind: Deployment
              name: web
            path: previews/patches/deployment-env.yaml
          - target:
              group: gateway.networking.k8s.io
              kind: HTTPRoute
              name: web
            path: previews/patches/httproute-hostname.yaml
          - target:
              group: argocd-image-updater.argoproj.io
              kind: ImageUpdater
              name: web
            path: previews/patches/image-updater-preview.yaml
          - target:
              kind: ConfigMap
              name: preview-demo
            path: previews/patches/preview-demo.yaml
          - target:
              kind: PersistentVolume
              name: web-s3-public
            path: previews/patches/s3-persistent-volume.yaml
          - target:
              kind: PersistentVolumeClaim
              name: web-s3-public
            path: previews/patches/s3-persistent-volume-claim.yaml
    - index: 1
      action: keep
      helm:
        valuesObject:
          message: preview-{{.PreviewID}}
  values:
    hostname: web-{{.PreviewID}}.sonia-certs.uk
    imageTagPrefix: preview-{{.PreviewID}}-
  # Values a preview requester may override from the UI. Everything else is
  # fixed by this template. imageTagPrefix lets a preview point Argo CD Image
  # Updater at a specific build (e.g. a PR's images) without renaming the
  # preview; leaving it blank uses the default above.
  expose:
    - imageTagPrefix
  secrets:
    import:
      - ghcr-pull-secret
      - shared-preview-secret
    generated:
      - generated-preview-secret
