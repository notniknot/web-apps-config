preview:
  enabled: true
  app: web
  tenant: web
  configRepository: web-apps-config
  source:
    path: apps/web/playground
    targetRevision: main
  components:
    - ../previews/components/preview
  patches:
    - target:
        group: apps
        version: v1
        kind: Deployment
        name: web
      path: previews/patches/deployment-env.yaml
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
        name: web
      path: previews/patches/httproute-hostname.yaml
    - target:
        group: argocd-image-updater.argoproj.io
        version: v1alpha1
        kind: ImageUpdater
        name: web
      path: previews/patches/image-updater-preview.yaml
    - target:
        kind: ConfigMap
        name: preview-demo
      path: previews/patches/preview-demo.yaml
  hostnameTemplate: web-pr-{{.PR}}.sonia-certs.uk
  secrets:
    import:
      - ghcr-pull-secret
      - shared-preview-secret
    generated:
      - generated-preview-secret
